<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --accent: #ffd700;
      --input-bg: rgba(255, 255, 255, 0.1);
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(100, 149, 237, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .search-box {
      position: relative;
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 16px 24px 16px 52px;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: var(--input-bg);
      backdrop-filter: blur(10px);
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .weather-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .city-info h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .city-info .date {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .weather-icon {
      font-size: 64px;
      animation: float 3s ease-in-out infinite;
    }

    .weather-main {
      text-align: center;
      margin-bottom: 24px;
    }

    .temperature {
      font-family: 'DM Sans', sans-serif;
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .temperature sup {
      font-size: 32px;
      vertical-align: super;
    }

    .weather-desc {
      font-size: 18px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding-top: 24px;
      border-top: 1px solid var(--card-border);
    }

    .detail-item {
      text-align: center;
    }

    .detail-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .detail-value {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 60px 0;
    }

    .loading.active {
      display: block;
    }

    .skeleton {
      background: linear-gradient(90deg, 
        rgba(255,255,255,0.05) 25%, 
        rgba(255,255,255,0.1) 50%, 
        rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-city {
      width: 120px;
      height: 32px;
      margin: 0 auto 12px;
    }

    .skeleton-temp {
      width: 160px;
      height: 72px;
      margin: 0 auto 12px;
    }

    .skeleton-desc {
      width: 100px;
      height: 20px;
      margin: 0 auto;
    }

    .error-msg {
      display: none;
      text-align: center;
      padding: 40px;
      color: #ff6b6b;
    }

    .error-msg.active {
      display: block;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      
      .weather-card {
        padding: 24px;
      }
      
      .temperature {
        font-size: 56px;
      }
      
      .weather-icon {
        font-size: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="search-box">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input type="text" class="search-input" id="cityInput" placeholder="搜索城市..." value="深圳">
    </div>

    <div class="weather-card" id="weatherCard">
      <div class="loading" id="loading">
        <div class="skeleton skeleton-city"></div>
        <div class="skeleton skeleton-temp"></div>
        <div class="skeleton skeleton-desc"></div>
      </div>

      <div class="error-msg" id="errorMsg">
        无法获取天气数据，请检查城市名称
      </div>

      <div id="weatherContent">
        <div class="weather-header">
          <div class="city-info">
            <h1 id="cityName">加载中...</h1>
            <div class="date" id="weatherDate"></div>
          </div>
          <div class="weather-icon" id="weatherIcon">⛅</div>
        </div>

        <div class="weather-main">
          <div class="temperature" id="temperature">--<sup>°C</sup></div>
          <div class="weather-desc" id="weatherDesc">--</div>
        </div>

        <div class="weather-details">
          <div class="detail-item">
            <div class="detail-label">湿度</div>
            <div class="detail-value" id="humidity">--%</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">风速</div>
            <div class="detail-value" id="wind">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">体感</div>
            <div class="detail-value" id="feelsLike">--°C</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const weatherIcons = {
      'sunny': '☀️',
      'clear': '☀️',
      'partly cloudy': '⛅',
      'cloudy': '☁️',
      'overcast': '☁️',
      'mist': '🌫️',
      'fog': '🌫️',
      'rain': '🌧️',
      'light rain': '🌧️',
      'moderate rain': '🌧️',
      'heavy rain': '⛈️',
      'snow': '❄️',
      'light snow': '❄️',
      'heavy snow': '🌨️',
      'thunderstorm': '⛈️',
      'default': '🌤️'
    };

    function getWeatherIcon(condition) {
      const lower = condition.toLowerCase();
      for (const [key, icon] of Object.entries(weatherIcons)) {
        if (lower.includes(key)) return icon;
      }
      return weatherIcons.default;
    }

    function formatDate() {
      const now = new Date();
      const options = { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        weekday: 'long'
      };
      return now.toLocaleDateString('zh-CN', options);
    }

    async function fetchWeather(city) {
      const loading = document.getElementById('loading');
      const content = document.getElementById('weatherContent');
      const errorMsg = document.getElementById('errorMsg');

      loading.classList.add('active');
      content.style.display = 'none';
      errorMsg.classList.remove('active');

      try {
        const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
        
        if (!response.ok) {
          throw new Error('City not found');
        }

        const data = await response.json();
        const current = data.current_condition[0];

        document.getElementById('cityName').textContent = data.nearest_area?.[0]?.areaName?.[0]?.value || city;
        document.getElementById('weatherDate').textContent = formatDate();
        document.getElementById('weatherIcon').textContent = getWeatherIcon(current.weatherDesc[0].value);
        document.getElementById('temperature').innerHTML = `${current.temp_C[0]}<sup>°C</sup>`;
        document.getElementById('weatherDesc').textContent = current.weatherDesc[0].value;
        document.getElementById('humidity').textContent = `${current.humidity[0]}%`;
        document.getElementById('wind').textContent = `${current.windspeedKmph[0]} km/h`;
        document.getElementById('feelsLike').textContent = `${current.FeelsLikeC[0]}°C`;

        loading.classList.remove('active');
        content.style.display = 'block';

        // Re-trigger animation
        const card = document.getElementById('weatherCard');
        card.style.animation = 'none';
        card.offsetHeight; // Trigger reflow
        card.style.animation = 'fadeInUp 0.6s ease-out';

      } catch (error) {
        loading.classList.remove('active');
        errorMsg.classList.add('active');
      }
    }

    const cityInput = document.getElementById('cityInput');

    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const city = cityInput.value.trim();
        if (city) {
          fetchWeather(city);
        }
      }
    });

    // Initial load
    fetchWeather('深圳');
  </script>
</body>
</html>
